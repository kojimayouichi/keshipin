  if (animId) { cancelAnimationFrame(animId); animId = null; }
  applyTurnRotation(0);
  selectState.abilities = Array.from({length: 4}, () => []);
  selectState.stage = -1;
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('restart-btn').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  stopBGM();
  stopSelectBGM();
}

// マウスイベント
function handleMouseDown(e) {
  const selectVisible = document.getElementById('select-screen').style.display !== 'none';
  if (!muted && !bgmPlaying && !selectVisible) startBGM();

  // CPUのターン中はP1操作をブロック
  if (gameMode === 'solo' && state.turn === cpuPlayer && state.phase === 'aim') return;
  const warpPlayer = state.warpReady.findIndex(v => v);

  if (warpPlayer >= 0 && state.phase === 'aim') {
    const pos = getPos(e);
    const wx = Math.max(MARGIN+12, Math.min(W-MARGIN-12, pos.x));
    const wy = Math.max(MARGIN+12, Math.min(H-MARGIN-12, pos.y));
    const er = state.erasers.find(e => e.owner === warpPlayer && e.alive);
    if (er) {
      let wx2 = wx, wy2 = wy;
      // 相手の消しゴムと重ならないよう補正
      const enemy = state.erasers.find(e => e.owner !== warpPlayer && e.alive);
      if (enemy) {
        const minDx = (er.w + enemy.w) / 2 + 4;
        const minDy = (er.h + enemy.h) / 2 + 4;
        const overlapX = minDx - Math.abs(wx2 - enemy.x);
        const overlapY = minDy - Math.abs(wy2 - enemy.y);
        if (overlapX > 0 && overlapY > 0) {
          // 重なりが小さい軸で押し出す
          if (overlapX < overlapY) {
            wx2 += wx2 < enemy.x ? -overlapX : overlapX;
          } else {
            wy2 += wy2 < enemy.y ? -overlapY : overlapY;
          }
          // 落下ゾーン内に収める
          wx2 = Math.max(MARGIN+12, Math.min(W-MARGIN-12, wx2));
          wy2 = Math.max(MARGIN+12, Math.min(H-MARGIN-12, wy2));
        }
      }
      er.x = wx2; er.y = wy2;
      er.vx = 0; er.vy = 0; er.angle = 0;
      if (!muted) { const c=getAudioCtx(); playTone(880,'sine',0.15,0.3,c.currentTime,c); playTone(1200,'sine',0.15,0.2,c.currentTime+0.1,c); }
    }
    state.warpReady[warpPlayer] = false;
    state.phase = 'warp_end'; // ターン交代まで操作不可
    document.getElementById('status').textContent = `✨ P${warpPlayer+1}がワープした！`;
    updateAbilityBtns();
    draw();
    // ターン終了
    setTimeout(() => {
      state.firstTurnProtect = false;
      state.phase = 'aim';
      advanceTurn();
    }, 600);
    return;
  }

  if (state.phase !== 'aim') return;
  const pos = getPos(e);
  // 現在のターンのプレイヤーの消しゴムかチェック
  state.erasers.forEach((er, i) => {
    if (!er.alive || er.owner !== state.turn) return;
    if (Math.abs(pos.x - er.x) < er.w/2+6 && Math.abs(pos.y - er.y) < er.h/2+6) {
      state.dragging = i;
      state.dragStart = { x: pos.x, y: pos.y };
      state.mousePos = pos;
      startCharge();
    }
  });
}
canvas.addEventListener('mousedown', handleMouseDown);

function handleMouseMove(e) {
  if (state.warpReady.some(v => v)) {
    state.mousePos = getPos(e);
    draw();
    return;
  }
  if (state.dragging === null) return;
  state.mousePos = getPos(e);
  // チャージ音更新
  if (state.dragStart) {
    const pos = getPos(e);
    const dx = state.dragStart.x - pos.x;
    const dy = state.dragStart.y - pos.y;
    const pct = Math.min(Math.sqrt(dx*dx+dy*dy), 120) / 120;
    updateCharge(pct);
  }
  draw();
}
window.addEventListener('mousemove', handleMouseMove);

function handleMouseUp(e) {
  if (state.dragging === null) return;
  stopCharge();
  const pos = getPos(e);
  const dx = state.dragStart.x - pos.x;
  const dy = state.dragStart.y - pos.y;
  const power = Math.min(Math.sqrt(dx*dx+dy*dy), 120);
  if (power > 5) {
    const angle = Math.atan2(dy, dx);
    const ab = state.abilities[state.turn];
    const isPower2 = (state.abilityActive === state.turn && state.abilitiesList[state.turn][state.abilityActiveSlot] === 'power2');
    if (state.abilityActive === state.turn) {
      state.abilityActive = -1;
      updateAbilityBtns();
    }
    const speed = power * 0.10 * (isPower2 ? 2.0 : 1.0);
    const er = state.erasers[state.dragging];
    er.powered = isPower2;
    er.slowPower = isPower2;
    er.launchPower = power; // 発射時のパワーを記録
    // ホーミングは発射時に有効化（能力選択後に発射）
    // homingActiveは既にtrueになっているのでそのままでOK
    if (!muted) sfxShoot(isPower2);
    er.vx = Math.cos(angle) * speed;
    er.vy = Math.sin(angle) * speed;
    er.av = (Math.random()-0.5)*0.1;
    state.phase = 'flying';
    startPhysics();
  }
  state.dragging = null;
  state.dragStart = null;
  state.mousePos = null;
}

// タッチ対応
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  let cx, cy;
  if (e.touches && e.touches.length > 0) {
    cx = e.touches[0].clientX;
    cy = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    cx = e.changedTouches[0].clientX;
    cy = e.changedTouches[0].clientY;
  } else {
    cx = e.clientX;
    cy = e.clientY;
  }
  let x = (cx - rect.left) * (W / rect.width);
  let y = (cy - rect.top)  * (H / rect.height);
  // P2ターン時に画面が180度回転している場合は座標を反転
  if (isMobile && state.turn === 1) {
    x = W - x;
    y = H - y;
  }
  return { x, y };
}

// タッチイベント → 同じハンドラを呼ぶ
function onPointerDown(e) {
  if (e.target && e.target.closest('button, input, select, a')) return;
  e.preventDefault();
  handleMouseDown(e);
}
function onPointerMove(e) { e.preventDefault(); handleMouseMove(e); }
function onPointerUp(e) {
  const selectVisible = document.getElementById('select-screen').style.display !== 'none';
  if (selectVisible) return;
  if (state.dragging === null && !state.warpReady.some(v => v)) return;
  e.preventDefault();
  handleMouseUp(e);
}

canvas.addEventListener('touchstart', onPointerDown, {passive:false});
document.addEventListener('touchmove', (e) => {
  const selectVisible = document.getElementById('select-screen').style.display !== 'none';
  if (selectVisible) return;
  if (state.dragging !== null || state.warpReady.some(v=>v)) e.preventDefault();
  onPointerMove(e);
}, {passive:false});
window.addEventListener('mouseup', handleMouseUp);
document.addEventListener('touchend', onPointerUp, {passive:false});


// ===== オーディオ =====
let audioCtx = null;
let masterGain = null;
let bgmGain = null;
let sfxGain = null;
let bgmInterval = null;
let bgmPlaying = false;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(1, audioCtx.currentTime);
    masterGain.connect(audioCtx.destination);
    // BGM専用ゲイン
    bgmGain = audioCtx.createGain();
    bgmGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
    bgmGain.connect(masterGain);
    // 効果音専用ゲイン
    sfxGain = audioCtx.createGain();
    sfxGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
    sfxGain.connect(masterGain);
  }
  return audioCtx;
}

function getMasterGain() {
  getAudioCtx();
  return masterGain;
}
function getBGMGain() {
  getAudioCtx();
  return bgmGain;
}
function getSFXGain() {
  getAudioCtx();
  return sfxGain;
}

function playTone(freq, type, duration, volume, startTime, ctx) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(getBGMGain());
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(volume, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

// 効果音
// チャージ音（ドラッグ中に鳴り続ける）
// チャージ音：複数オシレーターでサイバー感を演出
let chargeNodes = [];

function startCharge() {
  if (muted) return;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  chargeNodes = [];

  // Layer1: ベース低音（のこぎり波）
  const osc1 = ctx.createOscillator();
  const g1 = ctx.createGain();
  osc1.connect(g1); g1.connect(getSFXGain());
  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(80, ctx.currentTime);
  g1.gain.setValueAtTime(0.0, ctx.currentTime);
  g1.gain.linearRampToValueAtTime(0.02, ctx.currentTime + 0.08);
  osc1.start();
  chargeNodes.push({ osc: osc1, gain: g1, role: 'base' });

  // Layer2: 中音パルス（矩形波）
  const osc2 = ctx.createOscillator();
  const g2 = ctx.createGain();
  osc2.connect(g2); g2.connect(getSFXGain());
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(160, ctx.currentTime);
  g2.gain.setValueAtTime(0.0, ctx.currentTime);
  g2.gain.linearRampToValueAtTime(0.012, ctx.currentTime + 0.1);
  osc2.start();
  chargeNodes.push({ osc: osc2, gain: g2, role: 'mid' });

  // Layer3: 高音ホイッスル（sine）
  const osc3 = ctx.createOscillator();
  const g3 = ctx.createGain();
  osc3.connect(g3); g3.connect(getSFXGain());
  osc3.type = 'sine';
  osc3.frequency.setValueAtTime(400, ctx.currentTime);
  g3.gain.setValueAtTime(0.0, ctx.currentTime);
  g3.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.12);
  osc3.start();
  chargeNodes.push({ osc: osc3, gain: g3, role: 'high' });
}

function updateCharge(pct) {
  if (!chargeNodes.length || muted) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;

  chargeNodes.forEach(({ osc, gain, role }) => {
    if (role === 'base') {
      // 80Hz→400Hz に上昇
      osc.frequency.setValueAtTime(80 + pct * 320, now);
      gain.gain.setValueAtTime(0.015 + pct * 0.025, now);
    } else if (role === 'mid') {
      // 160Hz→800Hz に上昇（ベースの2倍）+ ビビリ感
      osc.frequency.setValueAtTime(160 + pct * 640, now);
      gain.gain.setValueAtTime(0.008 + pct * 0.015, now);
    } else if (role === 'high') {
      // 400Hz→2400Hz に上昇（サイバー的な高音）
      osc.frequency.setValueAtTime(400 + pct * 2000, now);
      gain.gain.setValueAtTime(pct * 0.015, now); // チャージが溜まるほど目立つ
    }
  });
}

function stopCharge() {
  if (!chargeNodes.length) return;
  const ctx = getAudioCtx();
  const now = ctx.currentTime;
  chargeNodes.forEach(({ osc, gain }) => {
    gain.gain.setValueAtTime(gain.gain.value, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.stop(now + 0.07);
  });
  chargeNodes = [];
}

function sfxShoot(powered) {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  if (powered) {
    playTone(180, 'sawtooth', 0.08, 0.3, t, ctx);
    playTone(280, 'square',   0.12, 0.25, t+0.04, ctx);
    playTone(440, 'sine',     0.15, 0.2, t+0.08, ctx);
  } else {
    playTone(300, 'square', 0.06, 0.2, t, ctx);
    playTone(200, 'sine',   0.08, 0.15, t+0.03, ctx);
  }
}

function sfxHit(powered) {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  if (powered) {
    // ド派手な衝突音
    [80,120,200].forEach((f,i) => playTone(f, 'sawtooth', 0.2, 0.3, t+i*0.02, ctx));
    playTone(600, 'sine', 0.1, 0.2, t+0.05, ctx);
  } else {
    playTone(150, 'square', 0.1, 0.25, t, ctx);
    playTone(100, 'sine',   0.12, 0.2, t+0.02, ctx);
  }
}

function sfxFall() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(getSFXGain());
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(80, t+0.4);
  gain.gain.setValueAtTime(0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
  osc.start(t); osc.stop(t+0.4);
}

function sfxWin() {
  const ctx = getAudioCtx();
  const t = ctx.currentTime;
  const melody = [523,659,784,1047];
  melody.forEach((f,i) => playTone(f, 'sine', 0.25, 0.3, t+i*0.15, ctx));
}

let bgmNodes = []; // スケジュール済みノードを追跡
let selectBgmPlaying = false;
let selectBgmInterval = null;
let selectBgmNodes = [];

function startSelectBGM() {
  if (selectBgmPlaying) return;
  selectBgmPlaying = true;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  // タイトル画面: C-Major 16拍 自然ループ (C→G→Am→F→C)
  const BPM = 88;
  const BEAT = 60 / BPM;
  const melody = [
    [523,0,1.8],[659,2,1.8],[784,4,1.8],[523,6,1.8],
    [587,8,1.8],[698,10,1.8],[523,12,3.8],
  ];
  const bass = [
    [130,0,3.8],[164,4,3.8],[110,8,3.8],[130,12,3.8],
  ];
  const loopLen = BEAT * 16;
  let loopStart = ctx.currentTime + 0.1;

  function scheduleSelectLoop(startAt) {
    if (!selectBgmPlaying) return;
    melody.forEach(([freq, beat, dur]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(getBGMGain());
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, startAt + beat*BEAT);
      gain.gain.setValueAtTime(0.001, startAt + beat*BEAT);
      gain.gain.linearRampToValueAtTime(0.09, startAt + beat*BEAT + 0.06);
      gain.gain.setValueAtTime(0.09, startAt + beat*BEAT + dur*BEAT - 0.1);
      gain.gain.linearRampToValueAtTime(0.001, startAt + beat*BEAT + dur*BEAT);
      osc.start(startAt + beat*BEAT);
      osc.stop(startAt + beat*BEAT + dur*BEAT + 0.05);
      selectBgmNodes.push(osc);
    });
    bass.forEach(([freq, beat, dur]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(getBGMGain());
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, startAt + beat*BEAT);
      gain.gain.setValueAtTime(0.001, startAt + beat*BEAT);
      gain.gain.linearRampToValueAtTime(0.12, startAt + beat*BEAT + 0.08);
      gain.gain.setValueAtTime(0.12, startAt + beat*BEAT + dur*BEAT - 0.12);
      gain.gain.linearRampToValueAtTime(0.001, startAt + beat*BEAT + dur*BEAT);
      osc.start(startAt + beat*BEAT);
      osc.stop(startAt + beat*BEAT + dur*BEAT + 0.05);
      selectBgmNodes.push(osc);
    });
    // 軽いパーカッション
    for (let i = 0; i < 16; i++) {
      if (i % 4 !== 0) continue;
      const bt = startAt + i * BEAT;
      const osc = ctx.createOscillator();
      const ng = ctx.createGain();
      osc.connect(ng); ng.connect(getBGMGain());
      osc.type = 'square';
      osc.frequency.setValueAtTime(80, bt);
      ng.gain.setValueAtTime(0.05, bt);
      ng.gain.exponentialRampToValueAtTime(0.001, bt+0.06);
      osc.start(bt); osc.stop(bt+0.07);
      selectBgmNodes.push(osc);
    }
  }

  scheduleSelectLoop(loopStart);
  selectBgmInterval = setInterval(() => {
    if (!selectBgmPlaying) { clearInterval(selectBgmInterval); return; }
    loopStart += loopLen;
    scheduleSelectLoop(loopStart);
  }, loopLen * 1000 - 100);
}

function stopSelectBGM() {
  selectBgmPlaying = false;
  if (selectBgmInterval) { clearInterval(selectBgmInterval); selectBgmInterval = null; }
  selectBgmNodes.forEach(osc => { try { osc.stop(); } catch(e){} });
  selectBgmNodes = [];
}

function playBGMTone(freq, type, duration, volume, startTime, ctx) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(getBGMGain());
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(volume, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
  bgmNodes.push(osc);
}

function stopAllBGMNodes() {
  bgmNodes.forEach(osc => { try { osc.stop(); } catch(e){} });
  bgmNodes = [];
}

function startBGM() {
  if (bgmPlaying) return;
  bgmPlaying = true;
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  const pat = BGM_PATTERNS[state.stagePattern] || BGM_PATTERNS[0];
  const BEAT = 60 / pat.bpm;
  const loopLen = BEAT * pat.bars;
  let loopStart = ctx.currentTime + 0.1;

  function scheduleLoop(startAt) {
    if (!bgmPlaying) return;
    // フェードイン/アウトで繋ぎ目を滑らかに
    pat.melody.forEach(([freq, beat, dur]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(getBGMGain());
      osc.type = pat.melType;
      osc.frequency.setValueAtTime(freq, startAt + beat*BEAT);
      gain.gain.setValueAtTime(0.001, startAt + beat*BEAT);
      gain.gain.linearRampToValueAtTime(pat.melVol, startAt + beat*BEAT + 0.05);
      gain.gain.setValueAtTime(pat.melVol, startAt + beat*BEAT + dur*BEAT - 0.08);
      gain.gain.linearRampToValueAtTime(0.001, startAt + beat*BEAT + dur*BEAT);
      osc.start(startAt + beat*BEAT);
      osc.stop(startAt + beat*BEAT + dur*BEAT + 0.05);
      bgmNodes.push(osc);
    });
    pat.bass.forEach(([freq, beat, dur]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(getBGMGain());
      osc.type = pat.bassType;
      osc.frequency.setValueAtTime(freq, startAt + beat*BEAT);
      gain.gain.setValueAtTime(0.001, startAt + beat*BEAT);
      gain.gain.linearRampToValueAtTime(pat.bassVol, startAt + beat*BEAT + 0.08);
      gain.gain.setValueAtTime(pat.bassVol, startAt + beat*BEAT + dur*BEAT - 0.1);
      gain.gain.linearRampToValueAtTime(0.001, startAt + beat*BEAT + dur*BEAT);
      osc.start(startAt + beat*BEAT);
      osc.stop(startAt + beat*BEAT + dur*BEAT + 0.05);
      bgmNodes.push(osc);
    });
    // upper（上声部）があれば追加
    if (pat.upper) {
      pat.upper.forEach(([freq, beat, dur]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(getBGMGain());
        osc.type = pat.upperType || 'sine';
        osc.frequency.setValueAtTime(freq, startAt + beat*BEAT);
        gain.gain.setValueAtTime(0.001, startAt + beat*BEAT);
        gain.gain.linearRampToValueAtTime(pat.upperVol, startAt + beat*BEAT + 0.3);
        gain.gain.setValueAtTime(pat.upperVol, startAt + beat*BEAT + dur*BEAT - 0.3);
        gain.gain.linearRampToValueAtTime(0.001, startAt + beat*BEAT + dur*BEAT);
        osc.start(startAt + beat*BEAT);
        osc.stop(startAt + beat*BEAT + dur*BEAT + 0.1);
        bgmNodes.push(osc);
      });
    }
    if (pat.drum) {
      for (let i = 0; i < pat.bars; i++) {
        const bt = startAt + i * BEAT;
        const osc = ctx.createOscillator();
        const ng = ctx.createGain();
        osc.connect(ng); ng.connect(getBGMGain());
        osc.type = 'square';
        osc.frequency.setValueAtTime(i%2===0 ? pat.drumFreqs[0] : pat.drumFreqs[1], bt);
        ng.gain.setValueAtTime(i%2===0 ? 0.06 : 0.03, bt);
        ng.gain.exponentialRampToValueAtTime(0.001, bt+0.05);
        osc.start(bt); osc.stop(bt+0.06);
        bgmNodes.push(osc);
      }
    }
  }

  scheduleLoop(loopStart);
  bgmInterval = setInterval(() => {
    if (!bgmPlaying) { clearInterval(bgmInterval); return; }
    loopStart += loopLen;
    scheduleLoop(loopStart);
  }, loopLen * 1000 - 100);
}

function stopBGM() {
  bgmPlaying = false;
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
  stopAllBGMNodes();
}

// ステージ変更時にBGMを切り替え
function switchBGM() {
  stopBGM();
  setTimeout(() => {
    if (!muted) startBGM();
  }, 50);
}

// ミュートボタン
let muted = false;
function setBGMVolume(val) {

function setSFXVolume(val) {

let muteToggling = false;
function toggleMute() {
  if (muteToggling) return;
  muteToggling = true;
  setTimeout(() => { muteToggling = false; }, 300);

  muted = !muted;
  const btn = document.getElementById('mute-btn');
  btn.textContent = muted ? '🔇' : '🔊';
  btn.disabled = true;
  setTimeout(() => { btn.disabled = false; }, 300);

  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  // masterGainで瞬時に無音/復音
  getMasterGain().gain.cancelScheduledValues(ctx.currentTime);
  getMasterGain().gain.setValueAtTime(muted ? 0 : 1, ctx.currentTime);

  if (muted) {
    stopCharge();
    stopBGM();
  } else {
    startBGM();
  }
}

// ===== 衝突エフェクト =====
function spawnCollisionEffect(x, y, speed, colorA, colorB) {
  const intensity = Math.min(1, speed / 12);
  const maxAge = Math.floor(20 + intensity * 25);
  // 衝撃波リング
  state.effects.push({ type:'collision_ring', x, y, color: colorB, intensity, age:0, maxAge });
  // 火花
  state.effects.push({ type:'collision_sparks', x, y, colorA, colorB, intensity, age:0, maxAge: Math.floor(25 + intensity*20),
    sparks: Array.from({length: Math.floor(6 + intensity*10)}, (_, i) => ({
      angle: Math.random() * Math.PI * 2,
      speed: (0.5 + Math.random() * 2) * (1 + intensity * 3),
      r: 2 + Math.random() * 3,
      color: Math.random() < 0.5 ? colorA : colorB,
    }))
  });
  // 強い衝撃なら画面シェイク
  if (intensity > 0.4) {
    const shakeAmt = intensity * 5;
    state.stageShake = { x: (Math.random()-0.5)*shakeAmt, y: (Math.random()-0.5)*shakeAmt };
    setTimeout(() => { state.stageShake = {x:0,y:0}; }, 80);
  }
  // SE
  if (!muted) sfxHit(intensity > 0.6);
}

// ===== 試合統計モーダル =====


function updateEffects() {
  state.effects = state.effects.filter(e => {
    e.age++;
    return e.age < e.maxAge;
  });
}

function drawEffects() {
  state.effects.forEach(ef => {
    const t = ef.age / ef.maxAge;
    ctx.save();

    if (ef.type === 'lightning') {
      // ⚡ バチバチ電撃：ジグザグ稲妻が放射
      ctx.globalAlpha = Math.max(0, 1 - t * 1.2);
      ctx.strokeStyle = ef.color;
      ctx.shadowColor = ef.color;
      ctx.shadowBlur = 15;
      for (let b = 0; b < 7; b++) {
        const angle = (b/7)*Math.PI*2 + ef.age*0.5;
        const len = 55 * t;
        ctx.lineWidth = 2.5 - t*2;
        ctx.beginPath();
        ctx.moveTo(ef.x, ef.y);
        let cx = ef.x, cy = ef.y;
        for (let s = 0; s < 4; s++) {
          const nx = cx + Math.cos(angle + (Math.random()-0.5)*1.2) * len/4 + (Math.random()-0.5)*10;
          const ny = cy + Math.sin(angle + (Math.random()-0.5)*1.2) * len/4 + (Math.random()-0.5)*10;
          ctx.lineTo(nx, ny);
          cx = nx; cy = ny;
        }
        ctx.stroke();
      }
      // 中心の白い閃光
      ctx.globalAlpha = Math.max(0, (1-t*2)*0.8);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 10*(1-t), 0, Math.PI*2);
      ctx.fill();

    } else if (ef.type === 'explosion') {
      // 💥 ドカーン：衝撃波リング＋パーティクル
      // 外側の衝撃波
      ctx.globalAlpha = Math.max(0, 1 - t);
      const shockR = 80 * t;
      const sg = ctx.createRadialGradient(ef.x, ef.y, shockR*0.7, ef.x, ef.y, shockR);
      sg.addColorStop(0, `rgba(255,180,0,${(1-t)*0.5})`);
      sg.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, shockR, 0, Math.PI*2);
      ctx.fill();
      // パーティクル
      for (let i = 0; i < 16; i++) {
        const a = (i/16)*Math.PI*2 + ef.age*0.05;
        const pr = 70*t * (0.6 + (i%3)*0.2);
        const px = ef.x + Math.cos(a)*pr;
        const py = ef.y + Math.sin(a)*pr;
        const ps = (1-t)*10;
        ctx.globalAlpha = Math.max(0, 1-t);
        ctx.fillStyle = ['#FF5252','#FF8C00','#FFD740'][i%3];
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(px, py, ps, 0, Math.PI*2);
        ctx.fill();
      }
      // 中心閃光
      ctx.globalAlpha = Math.max(0, (1-t*2));
      const cg = ctx.createRadialGradient(ef.x, ef.y, 0, ef.x, ef.y, 30*(1-t*0.5));
      cg.addColorStop(0, 'rgba(255,255,220,1)');
      cg.addColorStop(1, 'rgba(255,200,0,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 30*(1-t*0.5), 0, Math.PI*2);
      ctx.fill();

    } else if (ef.type === 'warp') {
      // ✨ シュッ瞬間移動：収束してフラッシュ
      ctx.globalAlpha = Math.max(0, 1 - t);
      // 収束する星型パーティクル
      for (let i = 0; i < 10; i++) {
        const a = (i/10)*Math.PI*2;
        const r = 50*(1-t);
        ctx.fillStyle = ef.color;
        ctx.shadowColor = ef.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(ef.x + Math.cos(a)*r, ef.y + Math.sin(a)*r, (1-t)*5, 0, Math.PI*2);
        ctx.fill();
      }
      // 中心の輝き
      if (t < 0.4) {
        ctx.globalAlpha = (0.4-t)/0.4;
        const wg = ctx.createRadialGradient(ef.x, ef.y, 0, ef.x, ef.y, 25);
        wg.addColorStop(0, 'rgba(255,255,255,1)');
        wg.addColorStop(1, `rgba(160,100,255,0)`);
        ctx.fillStyle = wg;
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, 25, 0, Math.PI*2);
        ctx.fill();
      }

    } else if (ef.type === 'double') {
      // 🎯 パンパン：2連の衝撃波リング
      ctx.globalAlpha = Math.max(0, 1 - t);
      [0.5, 1.0].forEach((scale, idx) => {
        const delay = idx * 0.15;
        const localT = Math.min(1, Math.max(0, t - delay));
        const r = 60 * localT * scale;
        ctx.strokeStyle = ef.color;
        ctx.lineWidth = (1-localT) * 5;
        ctx.shadowColor = ef.color;
        ctx.shadowBlur = 10;
        ctx.globalAlpha = Math.max(0, 1-localT);
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, r, 0, Math.PI*2);
        ctx.stroke();
      });
      // 中央フラッシュ
      if (t < 0.2) {
        ctx.globalAlpha = (0.2-t)/0.2 * 0.7;
        ctx.fillStyle = ef.color;
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, 15, 0, Math.PI*2);
        ctx.fill();
      }

    } else if (ef.type === 'shrink') {
      // 🔬 シュコーン：渦状に収縮する粒子
      ctx.globalAlpha = Math.max(0, 1 - t);
      for (let i = 0; i < 12; i++) {
        const a = (i/12)*Math.PI*2 + ef.age*0.15;
        const r = 45*(1-t);
        const px = ef.x + Math.cos(a)*r;
        const py = ef.y + Math.sin(a)*r;
        ctx.fillStyle = ef.color;
        ctx.shadowColor = ef.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(px, py, (1-t)*4+1, 0, Math.PI*2);
        ctx.fill();
        // 内向き矢印線
        ctx.strokeStyle = ef.color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(ef.x + Math.cos(a)*r*0.2, ef.y + Math.sin(a)*r*0.2);
        ctx.stroke();
      }

    } else if (ef.type === 'magnet') {
      // 🧲 ジリリリ：N/S極から磁力線が放射
      ctx.globalAlpha = Math.max(0, 1 - t);
      const colors = ['#F44336', '#1565C0'];
      [-1, 1].forEach((side, idx) => {
        const cx = ef.x + side * 20 * (1-t*0.5);
        const cy = ef.y;
        ctx.strokeStyle = colors[idx];
        ctx.shadowColor = colors[idx];
        ctx.shadowBlur = 8;
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 5; i++) {
          const a = (i/5)*Math.PI - Math.PI/2 + side * ef.age * 0.15;
          const r = 35 * t;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.quadraticCurveTo(
            cx + Math.cos(a)*r*0.7 + side*r*0.3,
            cy + Math.sin(a)*r,
            cx + Math.cos(a)*r * side * -1,
            cy + Math.sin(a)*r
          );
          ctx.stroke();
        }
      });
      // 中心のジリジリ感
      if (ef.age % 3 < 2) {
        ctx.globalAlpha = (1-t) * 0.5;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, 5*(1-t), 0, Math.PI*2);
        ctx.fill();
      }
    } else if (ef.type === 'homing') {
      // 🏹 ホーミング：追跡矢印が放射
      ctx.globalAlpha = Math.max(0, 1 - t);
      const r = 45 * t;
      for (let i = 0; i < 8; i++) {
        const a = (i/8)*Math.PI*2 + ef.age*0.1;
        const px = ef.x + Math.cos(a)*r;
        const py = ef.y + Math.sin(a)*r;
        ctx.fillStyle = ef.color;
        ctx.shadowColor = ef.color;
        ctx.shadowBlur = 8;
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(a);
        ctx.beginPath();
        ctx.moveTo(0, -6);
        ctx.lineTo(4, 4);
        ctx.lineTo(0, 2);
        ctx.lineTo(-4, 4);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      // 中心リング
      ctx.strokeStyle = ef.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, 12*(1-t*0.5), 0, Math.PI*2);
      ctx.stroke();

    } else if (ef.type === 'collision_ring') {
      // 衝撃波リング
      const r = 60 * t * (0.5 + ef.intensity * 0.8);
      ctx.globalAlpha = Math.max(0, (1 - t) * 0.85);
      ctx.strokeStyle = ef.color;
      ctx.shadowColor = ef.color;
      ctx.shadowBlur = 12 * (1 - t);
      ctx.lineWidth = (1 - t) * (3 + ef.intensity * 4);
      ctx.beginPath();
      ctx.arc(ef.x, ef.y, r, 0, Math.PI * 2);
      ctx.stroke();
      // 内側の小リング
      if (ef.intensity > 0.3) {
        ctx.globalAlpha = Math.max(0, (1 - t * 1.5) * 0.5);
        ctx.lineWidth = (1 - t) * 2;
        ctx.beginPath();
        ctx.arc(ef.x, ef.y, r * 0.55, 0, Math.PI * 2);
        ctx.stroke();
      }

    } else if (ef.type === 'collision_sparks') {
      // 火花パーティクル
      ef.sparks.forEach(sp => {
        const px = ef.x + Math.cos(sp.angle) * sp.speed * ef.age;
        const py = ef.y + Math.sin(sp.angle) * sp.speed * ef.age;
        const a = Math.max(0, 1 - t * 1.3);
        ctx.globalAlpha = a;
        ctx.fillStyle = sp.color;
        ctx.shadowColor = sp.color;
        ctx.shadowBlur = 6;
        const radius = sp.r * (1 - t * 0.6);
        ctx.beginPath();
        ctx.arc(px, py, radius, 0, Math.PI * 2);
        ctx.fill();
        // 火花の軌跡線
        if (ef.intensity > 0.5) {
          ctx.strokeStyle = sp.color;
          ctx.lineWidth = 1;
          ctx.globalAlpha = a * 0.5;
          ctx.beginPath();
          ctx.moveTo(ef.x, ef.y);
          ctx.lineTo(px, py);
          ctx.stroke();
        }
      });

    } else if (ef.type === 'mirror') {
      // 🪞 ミラー：キラキラ鏡面反射
      ctx.globalAlpha = Math.max(0, 1 - t);
      // 菱形フラッシュ
      const flashSize = 40 * (1 - t);
      ctx.fillStyle = '#E0F7FA';
      ctx.shadowColor = '#00BCD4';
      ctx.shadowBlur = 20;
      ctx.save();
      ctx.translate(ef.x, ef.y);
      ctx.rotate(ef.age * 0.15);
      ctx.beginPath();
      ctx.moveTo(0, -flashSize); ctx.lineTo(flashSize*0.3, 0);
      ctx.lineTo(0, flashSize); ctx.lineTo(-flashSize*0.3, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      // 星型スパーク
      for (let i = 0; i < 6; i++) {
        const sa = (i/6)*Math.PI*2 + ef.age*0.2;
        const sr = 50*t;
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 6;
        ctx.globalAlpha = Math.max(0, (1-t)*0.8);
        ctx.beginPath();
        ctx.arc(ef.x + Math.cos(sa)*sr, ef.y + Math.sin(sa)*sr, (1-t)*4, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
  });
}

function sfxAbility(ab) {
  if (muted) return;
  const c = getAudioCtx();
  const t = c.currentTime;

  if (ab === 'power2') {
    // ⚡ エネルギーチャージ：低音から高音へ上昇するチャージ音
    const osc = c.createOscillator(); const g = c.createGain();
    osc.connect(g); g.connect(getSFXGain());
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, t);
    osc.frequency.exponentialRampToValueAtTime(1200, t+0.5);
    g.gain.setValueAtTime(0.0, t);
    g.gain.linearRampToValueAtTime(0.25, t+0.35);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.55);
    osc.start(t); osc.stop(t+0.56);
    // 上に重なるハーモニクス
    const osc2 = c.createOscillator(); const g2 = c.createGain();
    osc2.connect(g2); g2.connect(getSFXGain());
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(160, t+0.1);
    osc2.frequency.exponentialRampToValueAtTime(2400, t+0.5);
    g2.gain.setValueAtTime(0.0, t+0.1);
    g2.gain.linearRampToValueAtTime(0.12, t+0.4);
    g2.gain.exponentialRampToValueAtTime(0.001, t+0.55);
    osc2.start(t+0.1); osc2.stop(t+0.56);
    // チャージ完了の高音ビープ
    const osc3 = c.createOscillator(); const g3 = c.createGain();
    osc3.connect(g3); g3.connect(getSFXGain());
    osc3.type = 'sine';
    osc3.frequency.setValueAtTime(1800, t+0.5);
    g3.gain.setValueAtTime(0.2, t+0.5);
    g3.gain.exponentialRampToValueAtTime(0.001, t+0.7);
    osc3.start(t+0.5); osc3.stop(t+0.72);

  } else if (ab === 'explode') {
    // 💥 ドカーン：ズドン低音＋パリーン破裂音
    // 超低音ドン
    const osc = c.createOscillator(); const g = c.createGain();
    osc.connect(g); g.connect(getSFXGain());
    osc.type = 'sine';
    osc.frequency.setValueAtTime(80, t);
    osc.frequency.exponentialRampToValueAtTime(25, t+0.6);
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.6);
    osc.start(t); osc.stop(t+0.65);
    // 衝撃ノイズ層
    const osc2 = c.createOscillator(); const g2 = c.createGain();
    osc2.connect(g2); g2.connect(getSFXGain());
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(200, t);
    osc2.frequency.exponentialRampToValueAtTime(40, t+0.4);
    g2.gain.setValueAtTime(0.3, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t+0.4);
    osc2.start(t); osc2.stop(t+0.42);
    // 高音パリーン
    const osc3 = c.createOscillator(); const g3 = c.createGain();
    osc3.connect(g3); g3.connect(getSFXGain());
    osc3.type = 'square';
    osc3.frequency.setValueAtTime(1200, t+0.02);
    osc3.frequency.exponentialRampToValueAtTime(200, t+0.2);
    g3.gain.setValueAtTime(0.15, t+0.02);
    g3.gain.exponentialRampToValueAtTime(0.001, t+0.22);
    osc3.start(t+0.02); osc3.stop(t+0.24);

  } else if (ab === 'warp') {
    // ✨ ピュイーン：上昇→急下降の電子音
    const osc = c.createOscillator(); const g = c.createGain();
    osc.connect(g); g.connect(getSFXGain());
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(2500, t+0.25);
    osc.frequency.exponentialRampToValueAtTime(150, t+0.55);
    g.gain.setValueAtTime(0.0, t);
    g.gain.linearRampToValueAtTime(0.25, t+0.1);
    g.gain.setValueAtTime(0.25, t+0.25);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.58);
    osc.start(t); osc.stop(t+0.6);
    // ビブラート感の副音
    const osc2 = c.createOscillator(); const g2 = c.createGain();
    osc2.connect(g2); g2.connect(getSFXGain());
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(450, t+0.05);
    osc2.frequency.exponentialRampToValueAtTime(3000, t+0.28);
    osc2.frequency.exponentialRampToValueAtTime(200, t+0.55);
    g2.gain.setValueAtTime(0.0, t+0.05);
    g2.gain.linearRampToValueAtTime(0.12, t+0.18);
    g2.gain.exponentialRampToValueAtTime(0.001, t+0.58);
    osc2.start(t+0.05); osc2.stop(t+0.6);

  } else if (ab === 'double') {
    // 🎯 パンパン連射：2連の発射音
    [0, 0.18].forEach(delay => {
      const osc = c.createOscillator(); const g = c.createGain();
      osc.connect(g); g.connect(getSFXGain());
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, t+delay);
      osc.frequency.exponentialRampToValueAtTime(150, t+delay+0.12);
      g.gain.setValueAtTime(0.2, t+delay);
      g.gain.exponentialRampToValueAtTime(0.001, t+delay+0.15);
      osc.start(t+delay); osc.stop(t+delay+0.16);
    });

  } else if (ab === 'shrink') {
    // 🔬 シュコーン：高速の収縮音
    const osc = c.createOscillator(); const g = c.createGain();
    osc.connect(g); g.connect(getSFXGain());
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1600, t);
    osc.frequency.exponentialRampToValueAtTime(200, t+0.25);
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.28);
    osc.start(t); osc.stop(t+0.3);
    // 高音キュッ
    const osc2 = c.createOscillator(); const g2 = c.createGain();
    osc2.connect(g2); g2.connect(getSFXGain());
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(3000, t);
    osc2.frequency.exponentialRampToValueAtTime(800, t+0.15);
    g2.gain.setValueAtTime(0.08, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t+0.18);
    osc2.start(t); osc2.stop(t+0.2);

  } else if (ab === 'magnet') {
    // 🧲 ジリリリ：電磁ブザー音
    const osc = c.createOscillator(); const g = c.createGain();
    osc.connect(g); g.connect(getSFXGain());
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, t);
    g.gain.setValueAtTime(0.0, t);
    // ジリジリ感（高速なトレモロ）
    for (let i = 0; i < 12; i++) {
      g.gain.linearRampToValueAtTime(i%2===0 ? 0.2 : 0.05, t + i*0.04);
    }
    g.gain.linearRampToValueAtTime(0.001, t+0.5);
    osc.start(t); osc.stop(t+0.52);
    // 高音ジリ
    const osc2 = c.createOscillator(); const g2 = c.createGain();
    osc2.connect(g2); g2.connect(getSFXGain());
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(320, t);
    g2.gain.setValueAtTime(0.0, t);
    for (let i = 0; i < 10; i++) {
      g2.gain.linearRampToValueAtTime(i%2===0 ? 0.08 : 0.01, t + i*0.05);
    }
    g2.gain.linearRampToValueAtTime(0.001, t+0.52);
    osc2.start(t); osc2.stop(t+0.54);
  } else if (ab === 'homing') {
    // 🏹 ホーミング：ビュン追跡音
    const osc = c.createOscillator(); const g = c.createGain();
    osc.connect(g); g.connect(getSFXGain());
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(2000, t+0.15);
    osc.frequency.exponentialRampToValueAtTime(600, t+0.4);
    g.gain.setValueAtTime(0.0, t);
    g.gain.linearRampToValueAtTime(0.22, t+0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.45);
    osc.start(t); osc.stop(t+0.5);
    const osc2 = c.createOscillator(); const g2 = c.createGain();
    osc2.connect(g2); g2.connect(getSFXGain());
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(1200, t+0.05);
    osc2.frequency.exponentialRampToValueAtTime(3000, t+0.2);
    g2.gain.setValueAtTime(0.0, t+0.05);
    g2.gain.linearRampToValueAtTime(0.1, t+0.12);
    g2.gain.exponentialRampToValueAtTime(0.001, t+0.3);
    osc2.start(t+0.05); osc2.stop(t+0.35);

  } else if (ab === 'mirror') {
    // 🪞 ミラー：キーン鏡面音
    const osc = c.createOscillator(); const g = c.createGain();
    osc.connect(g); g.connect(getSFXGain());
    osc.type = 'sine';
    osc.frequency.setValueAtTime(2500, t);
    osc.frequency.exponentialRampToValueAtTime(1200, t+0.3);
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    osc.start(t); osc.stop(t+0.4);
    const osc2 = c.createOscillator(); const g2 = c.createGain();
    osc2.connect(g2); g2.connect(getSFXGain());
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(3500, t+0.02);
    osc2.frequency.exponentialRampToValueAtTime(1600, t+0.25);
    g2.gain.setValueAtTime(0.1, t+0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, t+0.28);
    osc2.start(t+0.02); osc2.stop(t+0.3);
  }
}

function activateAbility(player, slot) {
  if (state.turn !== player) return;
  if (slot === undefined) slot = 0;
  const ab = state.abilitiesList[player] && state.abilitiesList[player][slot];
  if (!ab) return;
  const used = state.abilityUsed[player][slot];
  if (used && ab !== 'explode' && ab !== 'warp') return;
  // state.abilities[player]を現在のスロットに同期（既存処理との互換）
  state.abilities[player] = ab;
  // 即時発動系
  if (ab === 'explode') {
    const enemy = 1 - player;
    const enemyEr = state.erasers.find(e => e.owner === enemy && e.alive);
    // 激つよ: 爆発を2回連続発動
    const blastCount = (cpuDifficulty === 'legend' && player === cpuPlayer) ? 2 : 1;
    if (enemyEr) {
      for (let i = 0; i < blastCount; i++) {
        const myEr = state.erasers.find(e => e.owner === player && e.alive);
        const awayAngle = myEr
          ? Math.atan2(enemyEr.y - myEr.y, enemyEr.x - myEr.x)
          : Math.random() * Math.PI * 2;
        const spread = (Math.random() - 0.5) * Math.PI;
        const angle = awayAngle + spread;
        const power = 3 + Math.random() * 2;
        enemyEr.vx += Math.cos(angle) * power;
        enemyEr.vy += Math.sin(angle) * power;
        enemyEr.av += (Math.random() - 0.5) * 0.4;
      }
      state.phase = 'flying';
      startPhysics();
    }
    // 爆発は何度でも使える
    sfxAbility('explode');
    if (enemyEr) { const ef = {type:'explosion',x:enemyEr.x,y:enemyEr.y,color:'#FF5252',age:0,maxAge:30}; state.effects.push(ef); }
    const blastMsg = blastCount > 1 ? `💥💥 ダブル爆発！` : `💥 P${enemy+1}の消しゴムが爆発した！`;
    document.getElementById('status').textContent = blastMsg;
    updateAbilityBtns();
    return;
  }
  if (ab === 'warp') {
    // 位置選択モードに入る（無制限使用、abilityUsedをtrueにしない）
    state.warpReady[player] = true;
    sfxAbility('warp');
    const warpEr = state.erasers.find(e => e.owner === player && e.alive);
    if (warpEr) state.effects.push({type:'warp',x:warpEr.x,y:warpEr.y,color:'#CE93D8',age:0,maxAge:60});
    document.getElementById('status').textContent = `✨ ワープ先をクリックしてください`;
    updateAbilityBtns();
    draw();
    return;
  }
  if (ab === 'shrink') {
    const er = state.erasers.find(e => e.owner === player && e.alive);
    if (er) {
      er.w = 22; er.h = 11; // 半分のサイズに
      state.shrunk[player] = true;
    }
    state.abilityUsed[player][slot] = true;
    sfxAbility('shrink');
    if (er) state.effects.push({type:'shrink',x:er.x,y:er.y,color:'rgba(0,200,220,0.9)',age:0,maxAge:25});
    document.getElementById('status').textContent = `🔬 P${player+1}の消しゴムが縮んだ！`;
    updateAbilityBtns();
    draw();
    return;
  }
  if (ab === 'double') {
    state.doubleShot[player] = true;
    state.abilityUsed[player][slot] = true;
    state.abilityActive = -1;
    state.abilityActiveSlot = -1;
    sfxAbility('double');
    const dbEr = state.erasers.find(e => e.owner === player && e.alive);
    if (dbEr) state.effects.push({type:'double',x:dbEr.x,y:dbEr.y,color:'#69F0AE',age:0,maxAge:30});
    document.getElementById('status').textContent = `🎯 P${player+1}はもう1回打てる！`;
    updateAbilityBtns();
    return;
  }
  if (ab === 'magnet') {
    state.magnetActive[player] = true;
    state.abilityUsed[player][slot] = true;
    sfxAbility('magnet');
    const magMy = state.erasers.find(e => e.owner === player && e.alive);
    if (magMy) state.effects.push({type:'magnet',x:magMy.x,y:magMy.y,color:'#EF5350',age:0,maxAge:40});
    document.getElementById('status').textContent = `🧲 P${player+1}がマグネットを発動！`;
    updateAbilityBtns();
    // 相手の消しゴムを引き寄せる（徐々に引っ張る）
    const myEr = state.erasers.find(e => e.owner === player && e.alive);
    const enemyEr = state.erasers.find(e => e.owner !== player && e.alive);
    if (myEr && enemyEr) {
      const dx = myEr.x - enemyEr.x;
      const dy = myEr.y - enemyEr.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist > 0) {
        const pull = 18.0; // 引き寄せ力（3倍）
        enemyEr.vx = (dx/dist) * pull;
        enemyEr.vy = (dy/dist) * pull;
        // 相手だけ動かし、ターンは継続（flyingにしない）
        // 短いアニメ後にaimに戻る
        state.phase = 'flying';
        if (animId) { cancelAnimationFrame(animId); animId = null; }
        const savedTurn = state.turn;
        function magnetLoop() {
          const spd = Math.sqrt(enemyEr.vx*enemyEr.vx + enemyEr.vy*enemyEr.vy);
          if (spd < 0.3 || !enemyEr.alive) {
            // 両方の速度を完全リセット
            enemyEr.vx = 0; enemyEr.vy = 0; enemyEr.av = 0;
            myEr.vx = 0; myEr.vy = 0; myEr.av = 0;
            if (!enemyEr.alive) {
              state.erasers.forEach(e => {
                if (!e.alive) { state.scores[1 - e.owner]++; state._roundWinText = (1 - e.owner) + 1; }
              });
              endRound();
            } else {
              state.phase = 'aim';
              state.turn = savedTurn;
              updateStatus();
              draw();
            }
            return;
          }
          // 自分の消しゴムとの距離チェック：接触寸前で止める
          const stopDist = (myEr.w + enemyEr.w) / 2 + 2;
          const cdx = myEr.x - enemyEr.x;
          const cdy = myEr.y - enemyEr.y;
          const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
          if (cdist <= stopDist) {
            enemyEr.vx = 0; enemyEr.vy = 0; enemyEr.av = 0;
            myEr.vx = 0; myEr.vy = 0; myEr.av = 0;
            state.phase = 'aim';
            state.turn = savedTurn;
            updateStatus(); draw();
            return;
          }
          enemyEr.x += enemyEr.vx;
          enemyEr.y += enemyEr.vy;
          enemyEr.vx *= 0.92;
          enemyEr.vy *= 0.92;
          if (enemyEr.x < MARGIN || enemyEr.x > W-MARGIN || enemyEr.y < MARGIN || enemyEr.y > H-MARGIN) {
            enemyEr.alive = false;
          }
          draw();
          requestAnimationFrame(magnetLoop);
        }
        requestAnimationFrame(magnetLoop);
      }
    }
    state.magnetActive[player] = false;
    return;
  }
  // power2はトグル（発射時に発動）
  if (ab === 'homing') {
    state.homingActive[player] = true;
    state.abilityUsed[player][slot] = true;
    sfxAbility('homing');
    const er = state.erasers.find(e => e.owner === player && e.alive);
    if (er) state.effects.push({type:'homing',x:er.x,y:er.y,color:player===0?'#e8a0b0':'#90b8d8',age:0,maxAge:35});
    document.getElementById('status').textContent = `🏹 P${player+1}の消しゴムが次の発射で追尾する！`;
    updateAbilityBtns();
    return;
  }
  if (ab === 'mirror') {
    state.mirrorActive[player] = true;
    state.abilityUsed[player][slot] = true;
    sfxAbility('mirror');
    const er = state.erasers.find(e => e.owner === player && e.alive);
    if (er) state.effects.push({type:'mirror',x:er.x,y:er.y,color:'#E0F7FA',age:0,maxAge:40});
    document.getElementById('status').textContent = `🪞 P${player+1}がミラーを発動！次の衝撃を跳ね返す！`;
    updateAbilityBtns();
    return;
  }
  if (state.abilityActive === player && state.abilityActiveSlot === slot) {
    state.abilityActive = -1;
    state.abilityActiveSlot = -1;
    state.abilityUsed[player][slot] = false;
  } else {
    state.abilityActive = player;
    state.abilityActiveSlot = slot;
    state.abilityUsed[player][slot] = true;
    sfxAbility('power2');
    const p2Er = state.erasers.find(e => e.owner === player && e.alive);
    if (p2Er) { state.effects.push({type:'lightning',x:p2Er.x,y:p2Er.y,color:'#FFD740',age:0,maxAge:30}); state.effects.push({type:'lightning',x:p2Er.x+10,y:p2Er.y-10,color:'#FFE57F',age:0,maxAge:20}); }
  }
  updateAbilityBtns();
}

function updateAbilityBtns() {
  const clsNames = ['p1-btn','p2-btn','p3-btn','p4-btn'];
  for (let p = 0; p < numPlayers; p++) {
    const panel = document.getElementById(`ability-panel-${p}`);
    if (panel) panel.style.display = state.turn === p ? 'flex' : 'none';
    // CPU操作パネルは非表示
    if (gameMode === 'solo' && p === cpuPlayer && panel) panel.style.display = 'none';

    const btn = document.getElementById(`ability-open-btn-${p}`);
    if (!btn) continue;
    btn.className = `ability-btn ${clsNames[p] || 'p1-btn'}`;

    const list = state.abilitiesList[p] || [];
    const nonExplodeUsed = list.some((abId, slot) =>
      abId !== 'explode' && abId !== 'warp' && state.abilityUsed[p] && state.abilityUsed[p][slot]
    );
    const remaining = list.filter((abId, slot) => {
      if (abId === 'explode') return true;
      if (abId === 'warp') return true;
      if (state.abilityUsed[p] && state.abilityUsed[p][slot]) return false;
      if (nonExplodeUsed) return false;
      return true;
    });

    if (remaining.length === 0) {
      btn.textContent = '能力なし';
      btn.classList.add('used');
    } else {
      btn.textContent = `⚡ 能力を使う（${remaining.length}）`;
    }
    if (state.abilityActive === p) btn.classList.add('active');
  }
}

let abilityMenuPlayer = -1;

function toggleAbilityMenu(player) {
  if (state.phase !== 'aim') return;
  if (state.turn !== player) return;
  const menu = document.getElementById('ability-menu');
  if (menu.style.display === 'flex') { closeAbilityMenu(); return; }
  openAbilityMenu(player);
}

function openAbilityMenu(player) {
  abilityMenuPlayer = player;
  const menu = document.getElementById('ability-menu');
  const title = document.getElementById('ability-menu-title');
  const list = document.getElementById('ability-menu-list');
  const menuColors = ['#c06070','#4080a8','#388e3c','#e65100'];
  const color = menuColors[player] || '#666';
  const pLabel = gameMode === 'solo' && player === cpuPlayer ? 'CPU' : `P${player+1}`;
  title.textContent = `${pLabel} の能力を選ぶ`;
  title.style.color = color;
  list.innerHTML = '';

  const abilities = state.abilitiesList[player] || [];
  // 爆発以外をすでに1つでも使ったか
  const nonExplodeUsed = abilities.some((abId, slot) =>
    abId !== 'explode' && abId !== 'warp' && state.abilityUsed[player] && state.abilityUsed[player][slot]
  );

  abilities.forEach((abId, slot) => {
    const ab = ABILITIES.find(a => a.id === abId);
    if (!ab) return;
    const used = state.abilityUsed[player] && state.abilityUsed[player][slot];
    const isExplode = (abId === 'explode');
    const isWarp = (abId === 'warp');
    const isInfinite = isExplode || isWarp;
    const isActive = (state.abilityActive === player && state.abilityActiveSlot === slot);
    // 爆発・ワープ以外が使用済みなら、他の爆発・ワープ以外は選べない
    const disabledByRule = !isInfinite && !used && nonExplodeUsed;
    const disabled = (used && !isInfinite) || disabledByRule;

    const btnEl = document.createElement('button');
    btnEl.style.cssText = `
      width:100%;padding:10px 14px;border-radius:6px;font-family:'Kosugi Maru',sans-serif;
      font-size:0.85rem;cursor:${disabled ? 'not-allowed' : 'pointer'};text-align:left;border:2px solid;
      transition:opacity 0.15s;
      background:${player===0?'#f7e8ed':'#e8f0f7'};
      border-color:${player===0?'#e8a0b0':'#90b8d8'};
      color:${disabledByRule ? '#bbb' : (player===0?'#c06070':'#4080a8')};
      opacity:${disabled ? '0.4' : '1'};
      text-decoration:${(used && !isExplode) ? 'line-through' : 'none'};
      box-shadow:${isActive ? `0 0 0 3px rgba(255,180,0,0.8)` : 'none'};
    `;
    btnEl.innerHTML = `${ab.emoji} ${ab.name}${isExplode ? ' <span style="font-size:0.65rem;opacity:0.7">（無制限）</span>' : ''}${isWarp ? ' <span style="font-size:0.65rem;opacity:0.7">（無制限・ターン終了）</span>' : ''}${isActive ? ' ✓選択中' : ''}${disabledByRule ? ' <span style="font-size:0.65rem;color:#bbb">（使用不可）</span>' : ''}`;
    btnEl.disabled = disabled;
    btnEl.onclick = () => {
      closeAbilityMenu();
      activateAbility(player, slot);
    };
    list.appendChild(btnEl);
  });

  menu.style.display = 'flex';
}

function closeAbilityMenu() {
  document.getElementById('ability-menu').style.display = 'none';
  abilityMenuPlayer = -1;
}

// メニュー外タップで閉じる
document.getElementById('ability-menu').addEventListener('click', function(e) {
  if (e.target === this) closeAbilityMenu();
});

// セレクト画面関数をグローバルに公開
window.selectStage = selectStage;
window.resetAbility = resetAbility;
window.selectAbility = selectAbility;
window.startFromSelect = startFromSelect;
window.activateAbility = activateAbility;
window.toggleAbilityMenu = toggleAbilityMenu;
window.closeAbilityMenu = closeAbilityMenu;
window.toggleMute = toggleMute;
window.setBGMVolume = setBGMVolume;
window.setSFXVolume = setSFXVolume;
window.restartRound = restartRound;

init();
// タイトル画面を表示（BGMはユーザー操作後に開始）
document.getElementById('title-screen').style.display = 'flex';
document.getElementById('select-screen').style.display = 'none';
// タイトル画面でのBGM開始（ブラウザ制限対応）
const startTitleBGMOnce = () => {
  if (!muted) startSelectBGM();
  document.removeEventListener('mousedown', startTitleBGMOnce);
  document.removeEventListener('touchstart', startTitleBGMOnce);
  document.removeEventListener('keydown', startTitleBGMOnce);
};
document.addEventListener('mousedown', startTitleBGMOnce);
document.addEventListener('touchstart', startTitleBGMOnce);
document.addEventListener('keydown', startTitleBGMOnce);

// 統合ゲームループ
function gameLoop() {
  canvas.style.cursor = (state.warpReady.some(v => v)) ? 'crosshair' : 'default';
  if (state.phase === 'flying') {
    update();
  }
  draw();
  animId = requestAnimationFrame(gameLoop);
}
animId = requestAnimationFrame(gameLoop);
</script>
</body>
</html>
